name: CI/CD Pipeline - Go QA Framework

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

env:
  GO_VERSION: '1.21'

jobs:
  # ============================================
  # JOB 1: Lint & Security
  # ============================================
  lint-security:
    name: Lint & Security Scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true
    
    - name: Install linting tools
      run: |
        go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
        go install github.com/securego/gosec/v2/cmd/gosec@latest
    
    - name: Run golangci-lint
      run: golangci-lint run --timeout=5m
    
    - name: Run security scan
      run: gosec ./...

  # ============================================
  # JOB 2: Unit Tests (Multi Go Version)
  # ============================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-security
    strategy:
      matrix:
        go-version: ['1.21', '1.22', '1.23']
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Go ${{ matrix.go-version }}
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
        cache: true
    
    - name: Run unit tests
      run: go test -v -race ./internal/...
    
    - name: Generate coverage
      run: go test -coverprofile=coverage.out ./internal/...
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.out
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  # ============================================
  # JOB 3: Integration Tests (PostgreSQL)
  # ============================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint-security
    services:
      docker:
        image: docker:dind
        options: --privileged
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Run integration tests
      run: go test -v ./tests/integration/... -timeout=10m
      env:
        TESTCONTAINERS_RYUK_DISABLED: false

  # ============================================
  # JOB 4: Build (Optional - untuk release)
  # ============================================
  build:
    name: Build Binary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
    
    - name: Build
      run: go build -o bin/go-qa-framework ./cmd/main.go 2>/dev/null || echo "No main.go found, skipping build"